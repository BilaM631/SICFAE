{% extends 'formacao/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i> Confirmar Eliminação</h5>
                </div>
                <div class="card-body p-4 text-center">
                    <p class="fs-5 mb-4">Tem a certeza que deseja eliminar o formador <strong>{{ object.nome_completo }}</strong>?</p>
                    <div class="alert alert-warning text-start">
                        <i class="bi bi-info-circle-fill me-2"></i> Esta ação é irreversível e poderá afetar histórico de turmas associadas.
                    </div>
                </div>
                <div class="card-footer bg-light d-flex justify-content-end gap-2 p-3">
                    <a href="{% url 'formacao:lista_formadores_nacionais_crud' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <form method="post" class="m-0 p-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Sim, Eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
